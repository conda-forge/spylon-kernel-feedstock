{% set name = "spylon-kernel" %}
{% set version = "0.4.1" %}
{% set hashtype = "sha256" %}
{% set hash = "378a6fc652f6af8dbfbd48668bc1a0bc68bca1f28e8932985d88a8f6da4b29ab" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  {{ hashtype }}: {{ hash }}

build:
  noarch: python
  number: 1001
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pypandoc
    - pip
  run:
    - python >={{ python_min }}
    - ipykernel
    - jedi >=0.10
    - metakernel
    - spylon
    - tornado

test:
  requires:
    - python {{ python_min }}
  imports:
    - spylon_kernel

about:
  home: https://github.com/mariusvniekerk/spylon-kernel
  license: MIT
  summary: Scala magics and kernel for jupyter

extra:
  recipe-maintainers:
    - mariusvniekerk
    - parente
